backend:
  name: git-gateway
  branch: main

media_folder: "images"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - name: "home"
        label: "Home Page"
        file: "content/home.md"
        fields:
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
      - name: "about"
        label: "About Page"
        file: "content/about.md"
        fields:
          - { label: "Our Story", name: "story", widget: "text" }
          - { label: "Director Name", name: "director", widget: "string" }
          - { label: "Director Bio", name: "director_bio", widget: "text" }
